<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuickQR Generator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>مولد أكواد QR</h1>
        <p>أدخل الرابط أو النص لإنشاء الكود الخاص بك</p>
        
        <input type="text" id="qr-input" placeholder="أدخل النص هنا...">
        <button id="generate-btn">إنشاء الكود</button>

        <div id="qr-code-wrapper">
            <div id="qrcode"></div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
